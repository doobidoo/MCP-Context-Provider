{% extends "base.html" %}

{% block scripts %}
{{ super() }}
<script type="module">
// Mermaid CDN fallback: Material for MkDocs loads mermaid from unpkg.com
// which intermittently returns 503. This script loads from jsdelivr instead.
async function initMermaidFallback() {
  // Wait for Material's built-in mermaid loader to try first
  await new Promise(resolve => setTimeout(resolve, 1500));

  // Check for unrendered mermaid blocks (no SVG inside = not rendered)
  const blocks = document.querySelectorAll('.mermaid');
  const unrendered = Array.from(blocks).filter(
    el => !el.querySelector('svg') && !el.shadowRoot
  );

  if (unrendered.length === 0) return;

  // Load mermaid from jsdelivr
  const { default: mermaid } = await import(
    'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'
  );

  // Detect current color scheme for correct theme
  const scheme = document.body.getAttribute('data-md-color-scheme');
  mermaid.initialize({
    startOnLoad: false,
    theme: scheme === 'slate' ? 'dark' : 'default'
  });

  // Render all unrendered mermaid blocks
  await mermaid.run({ nodes: unrendered });
}

initMermaidFallback().catch(err => console.warn('Mermaid fallback:', err));
</script>
{% endblock %}
