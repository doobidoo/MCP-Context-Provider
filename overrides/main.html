{% extends "base.html" %}

{% block scripts %}
{{ super() }}
<script type="module">
// Mermaid CDN fallback: Material for MkDocs loads mermaid from unpkg.com
// which intermittently returns 503. When the import fails, Material strips
// the "mermaid" class from <pre> blocks but leaves raw code visible.
// This script detects unrendered mermaid blocks by content and renders them
// using mermaid loaded from jsdelivr.

const MERMAID_KEYWORDS = [
  'graph ', 'graph\n', 'flowchart ', 'sequenceDiagram', 'classDiagram',
  'stateDiagram', 'erDiagram', 'gantt', 'pie ', 'gitgraph',
  'mindmap', 'timeline', 'sankey', 'xychart', 'block-beta'
];

function isMermaidBlock(el) {
  const text = el.textContent.trimStart();
  return MERMAID_KEYWORDS.some(kw => text.startsWith(kw));
}

async function initMermaidFallback() {
  // Wait for Material's built-in mermaid loader to try (and possibly fail)
  await new Promise(resolve => setTimeout(resolve, 2000));

  // Find <pre> blocks that contain mermaid syntax but have no rendered SVG
  const allPre = document.querySelectorAll('pre');
  const unrendered = Array.from(allPre).filter(
    el => isMermaidBlock(el) && !el.querySelector('svg')
  );

  if (unrendered.length === 0) return;

  // Load mermaid from jsdelivr
  const { default: mermaid } = await import(
    'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'
  );

  // Detect current color scheme for correct theme
  const scheme = document.body.getAttribute('data-md-color-scheme');
  mermaid.initialize({
    startOnLoad: false,
    theme: scheme === 'slate' ? 'dark' : 'default'
  });

  // Restore the mermaid class so mermaid.run() can find them,
  // and set textContent directly (strip any <code> wrapper)
  for (const el of unrendered) {
    const diagramText = el.textContent;
    el.className = 'mermaid';
    el.textContent = diagramText;
  }

  // Render all mermaid blocks
  await mermaid.run({ nodes: unrendered });
}

initMermaidFallback().catch(err => console.warn('Mermaid fallback failed:', err));
</script>
{% endblock %}
