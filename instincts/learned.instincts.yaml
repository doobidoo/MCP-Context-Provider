version: "1.0"

instincts:
  claude-skill-directory-convention:
    id: claude-skill-directory-convention
    rule: >-
      Claude Code Skills müssen als <name>/SKILL.md Verzeichnis unter .claude/skills/ liegen,
      nicht als einzelne .md Datei. Frontmatter-Felder verwenden Bindestriche (user-invocable),
      keine Unterstriche.
    domain: claude-code
    tags: [claude-code, skills, config]
    trigger_patterns:
      - "skill.*discover"
      - "SKILL\\.md"
      - "claude.*skill"
      - "\\.claude/skills"
    confidence: 0.75
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-09T07:00:00Z"
    outcome_log: []

  readme-claims-verification:
    id: readme-claims-verification
    rule: >-
      Wenn eine README Feature-Claims macht (Testzahlen, Dependencies, Architektur),
      prüfe systematisch gegen die tatsächliche Implementierung. Besonders Dependency-Listen,
      Testzahlen und Projektstruktur veralten schnell.
    domain: docs
    tags: [docs, readme, verification, quality]
    trigger_patterns:
      - "README"
      - "readme.*claims"
      - "docs.*verify"
      - "documentation.*audit"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-09T07:00:00Z"
    outcome_log: []

  global-skill-symlink-pattern:
    id: global-skill-symlink-pattern
    rule: >-
      Für projektübergreifende Claude Code Skills: Symlink von ~/.claude/skills/<name>/SKILL.md
      auf die Repo-Quelle erstellen. Für globale MCP Server: Eintrag in ~/.claude/mcp.json mit
      absoluten Pfaden. Secrets nur in globaler Config, nie im Repo.
    domain: claude-code
    tags: [claude-code, config, global, mcp, security]
    trigger_patterns:
      - "global.*skill"
      - "skill.*everywhere"
      - "global.*mcp"
      - "~/.claude"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-09T07:00:00Z"
    outcome_log: []

  version-string-sync:
    id: version-string-sync
    rule: >-
      Bei Version-Bumps alle Stellen synchron halten: package.json, server source code
      (index.ts, tools.ts), mkdocs/docs, CHANGELOG. Grep nach der alten Versionsnummer
      um vergessene Stellen zu finden.
    domain: release
    tags: [release, version, sync, quality]
    trigger_patterns:
      - "version.*bump"
      - "bump.*version"
      - "release.*version"
      - "version.*update"
    confidence: 0.75
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-09T07:30:00Z"
    outcome_log: []

  mkdocs-mike-version-trap:
    id: mkdocs-mike-version-trap
    rule: >-
      Material for MkDocs mit version.provider: mike in mkdocs.yml zeigt einen
      Version-Selector im Header. Wenn nicht tatsächlich mike zum Deployen verwendet
      wird, entsteht eine stale Versionsanzeige. Entweder mike korrekt einrichten
      oder den Provider entfernen.
    domain: docs
    tags: [docs, mkdocs, versioning, config]
    trigger_patterns:
      - "mkdocs.*version"
      - "mike.*version"
      - "version.*header"
      - "gh-pages.*version"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-09T07:30:00Z"
    outcome_log: []

  swiftui-appstorage-over-userdefaults:
    id: swiftui-appstorage-over-userdefaults
    rule: >-
      In SwiftUI views, use @AppStorage for UserDefaults-backed state instead of
      reading UserDefaults directly. Plain UserDefaults reads are not reactive —
      the view won't update when values change.
    domain: swift
    tags: [swift, swiftui, state-management, userdefaults]
    trigger_patterns:
      - "UserDefaults.*SwiftUI"
      - "@State.*UserDefaults"
      - "UserDefaults\\.standard.*View"
      - "@AppStorage"
    confidence: 0.75
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:00:00Z"
    outcome_log: []

  apple-consent-defense-in-depth:
    id: apple-consent-defense-in-depth
    rule: >-
      When implementing user consent gates for Apple review (5.1.1/5.1.2), add
      guards at both the UI layer (alert/dialog) AND the data-sending layer
      (ViewModel/Service). Apple reviewers test edge cases and alternate code paths.
    domain: ios
    tags: [ios, apple-review, privacy, consent, security]
    trigger_patterns:
      - "consent.*guard"
      - "Apple.*5\\.1"
      - "privacy.*consent"
      - "data sharing.*consent"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:00:00Z"
    outcome_log: []

  ios-simulator-name-verify:
    id: ios-simulator-name-verify
    rule: >-
      Before running xcodebuild with a simulator destination, verify available
      simulator names with xcrun simctl list devices available. Simulator names
      change across Xcode versions (e.g., iPhone 16 Pro to iPhone 17 Pro).
    domain: xcode
    tags: [xcode, simulator, build, ios]
    trigger_patterns:
      - "xcodebuild.*destination"
      - "simulator.*name"
      - "iPhone.*Pro"
      - "simctl.*list"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:00:00Z"
    outcome_log: []

  secondbrain-version-bump-checklist:
    id: secondbrain-version-bump-checklist
    rule: >-
      SecondBrain version bumps require updating ALL of: MARKETING_VERSION +
      CURRENT_PROJECT_VERSION in project.pbxproj, version entry in .claude/CLAUDE.md,
      then commit + push. Per CLAUDE.md directive: always memorize and bump version
      after refactoring or extension.
    domain: workflow
    tags: [SecondBrain, release, version, checklist]
    trigger_patterns:
      - "version.*bump"
      - "MARKETING_VERSION"
      - "SecondBrain.*release"
      - "CURRENT_PROJECT_VERSION"
    confidence: 0.75
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:00:00Z"
    outcome_log: []

  bilingual-locale-detection-pattern:
    id: bilingual-locale-detection-pattern
    rule: >-
      For bilingual DE/EN iOS apps, detect language with
      Locale.current.language.languageCode?.identifier == "de" and use static
      computed properties for localized strings. Keep strings inline as static
      vars for small feature-scoped text rather than full Localizable files.
    domain: swift
    tags: [swift, ios, localization, german]
    trigger_patterns:
      - "bilingual"
      - "German.*English"
      - "Locale.*language"
      - "isGerman"
    confidence: 0.65
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:00:00Z"
    outcome_log: []

  git-clone-use-https-protocol:
    id: git-clone-use-https-protocol
    rule: >-
      Auf diesem Setup ist Git für HTTPS konfiguriert (gh auth protocol: https).
      Bei git clone immer HTTPS-URLs verwenden, nicht SSH (git@github.com:...).
      SSH-Keys sind nicht für GitHub eingerichtet.
    domain: git
    tags: [git, clone, https, ssh]
    trigger_patterns:
      - "git clone"
      - "git@github\\.com"
      - "Permission denied.*publickey"
      - "clone.*repo"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:30:00Z"
    outcome_log: []

  multi-machine-config-sync-via-ssh:
    id: multi-machine-config-sync-via-ssh
    rule: >-
      MacBook Pro ist via SSH unter macbook-pro-m2.local erreichbar. Für
      Config-Sync rsync verwenden. Hooks, Skills und MCP-Configs liegen unter
      ~/.claude/. Claude Desktop Config unter ~/Library/Application
      Support/Claude/claude_desktop_config.json.
    domain: workflow
    tags: [workflow, ssh, sync, multi-machine, config]
    trigger_patterns:
      - "macbook.*config"
      - "sync.*config"
      - "MacBook Pro"
      - "config.*übernehmen"
    confidence: 0.65
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:30:00Z"
    outcome_log: []

  skip-machine-specific-mcp-servers:
    id: skip-machine-specific-mcp-servers
    rule: >-
      Beim Synchronisieren von MCP-Server-Configs zwischen Maschinen:
      Machine-spezifische Server überspringen (mcp-obsidian mit iCloud-Pfaden,
      mcp-telegram mit API-Keys, hister Go-Binary). Nur portable/universelle
      Server übernehmen.
    domain: config
    tags: [config, mcp, sync, migration]
    trigger_patterns:
      - "mcp.*sync"
      - "config.*migrate"
      - "server.*übertragen"
      - "machine.*specific"
    confidence: 0.65
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-11T21:30:00Z"
    outcome_log: []

  audiocraft-macos-arm-xformers-patch:
    id: audiocraft-macos-arm-xformers-patch
    rule: >-
      AudioCraft auf macOS ARM erfordert: (1) pkg-config installieren,
      (2) PyTorch vor audiocraft installieren, (3) pip install audiocraft --no-deps
      + manuelle Runtime-Deps (einops, flashy, num2words, encodec, demucs, soundfile,
      spacy, librosa), (4) xformers-Import in transformer.py auf try/except patchen.
    domain: python
    tags: [python, audiocraft, macos, arm, apple-silicon, workaround]
    trigger_patterns:
      - "audiocraft"
      - "MusicGen.*macOS"
      - "xformers.*ARM"
      - "audiocraft.*install"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-12T08:30:00Z"
    outcome_log: []

  separate-venvs-conflicting-python-deps:
    id: separate-venvs-conflicting-python-deps
    rule: >-
      Python-Projekte mit inkompatiblen Dependency-Bäumen (z.B. ComfyUI +
      AudioCraft + WhisperX) in separate venvs installieren. Gemeinsame venvs
      führen zu Torch-Versionskonflikten und silent Failures.
    domain: python
    tags: [python, venv, dependencies, isolation]
    trigger_patterns:
      - "venv.*conflict"
      - "dependency.*conflict"
      - "pip.*incompatible"
      - "torch.*version"
    confidence: 0.75
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-12T08:30:00Z"
    outcome_log: []

  ollama-sequential-model-pulls:
    id: ollama-sequential-model-pulls
    rule: >-
      Ollama Model-Downloads sequentiell ausführen, nicht parallel mit &.
      Ollama-Server kann concurrent pulls nicht zuverlässig verarbeiten
      und bricht sporadisch ab.
    domain: devops
    tags: [ollama, llm, download, macos]
    trigger_patterns:
      - "ollama pull"
      - "ollama.*parallel"
      - "ollama.*download"
      - "model.*pull"
    confidence: 0.65
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-12T08:30:00Z"
    outcome_log: []

  bash-script-syntax-check-before-run:
    id: bash-script-syntax-check-before-run
    rule: >-
      Vor Ausführung von Bash-Scripts immer bash -n script.sh für Syntax-Check
      laufen lassen. Bei eingebetteten Heredoc-Scripts (helper scripts in installer)
      diese extrahieren und einzeln prüfen.
    domain: bash
    tags: [bash, scripting, validation, testing]
    trigger_patterns:
      - "bash.*script"
      - "setup.*script"
      - "installer.*sh"
      - "heredoc.*script"
    confidence: 0.7
    min_confidence: 0.5
    usage_count: 0
    approved_by: human
    active: true
    created_at: "2026-03-12T08:30:00Z"
    outcome_log: []
