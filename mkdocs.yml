site_name: MCP Context Provider
site_description: Persistent context and learned instincts for Claude Code — static rules meet confidence-scored intelligence
site_url: https://doobidoo.github.io/MCP-Context-Provider/
repo_url: https://github.com/doobidoo/MCP-Context-Provider
repo_name: doobidoo/MCP-Context-Provider
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - MCP Tools: mcp-tools.md
  - CLI Reference: cli.md
  - Contexts Reference: contexts-reference.md
  - Changelog: CHANGELOG.md

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/doobidoo/MCP-Context-Provider

copyright: Copyright &copy; 2025–2026 doobidoo — Apache License 2.0
